<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貸款攤還計算機</title>
    <style>
        :root {
            --primary-color: #007bff;
            --hover-color: #0056b3;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #2c3e50;
        }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        .form-control {
            flex: 1 1 200px;
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 0.9em;
        }
        input {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: var(--hover-color);
        }
        .summary {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            background: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin-top: 25px;
            gap: 10px;
        }
        .summary-item {
            text-align: center;
            flex: 1 1 30%;
        }
        .summary-item span {
            display: block;
            font-size: 0.85em;
            color: #6c757d;
        }
        .summary-item strong {
            display: block;
            font-size: 1.5em;
            color: #212529;
            margin-top: 5px;
        }
        .table-responsive {
            overflow-x: auto;
            margin-top: 25px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            background-color: #f8f9fa;
            font-weight: bold;
        }
        th:first-child, td:first-child {
            text-align: center;
        }
        #result-section {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>貸款攤還計算機</h2>

    <div class="input-group">
        <div class="form-control">
            <label for="principal">貸款本金 (元)</label>
            <input type="number" id="principal" value="1000000" min="0" step="10000">
        </div>
        <div class="form-control">
            <label for="rate">年利率 (%)</label>
            <input type="number" id="rate" value="2.0" min="0" step="0.1">
        </div>
        <div class="form-control">
            <label for="months">還款期數 (月)</label>
            <input type="number" id="months" value="120" min="1" step="1">
        </div>
    </div>

    <button onclick="calculate()">計算攤還明細</button>

    <div id="result-section">
        <div class="summary">
            <div class="summary-item">
                <span>每月還款金額</span>
                <strong id="summary-monthly">0</strong>
            </div>
            <div class="summary-item">
                <span>總利息支出</span>
                <strong id="summary-interest">0</strong>
            </div>
            <div class="summary-item">
                <span>總還款金額</span>
                <strong id="summary-total">0</strong>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>期數</th>
                        <th>本期還款</th>
                        <th>本金償還</th>
                        <th>利息支出</th>
                        <th>剩餘本金</th>
                    </tr>
                </thead>
                <tbody id="schedule-body">
                    <!-- 明細由 JavaScript 動態生成 -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function formatMoney(num) {
        return Math.round(num).toLocaleString('zh-TW');
    }

    function calculate() {
        const principal = parseFloat(document.getElementById('principal').value);
        const annualRate = parseFloat(document.getElementById('rate').value);
        const months = parseInt(document.getElementById('months').value);

        if (isNaN(principal) || isNaN(annualRate) || isNaN(months) || principal <= 0 || months <= 0) {
            alert('請輸入正確的正數數值。');
            return;
        }

        const monthlyRate = (annualRate / 100) / 12;
        let monthlyPayment = 0;

        // 計算每月還款金額 (PMT 公式)
        if (monthlyRate === 0) {
            monthlyPayment = principal / months;
        } else {
            monthlyPayment = principal * monthlyRate * Math.pow(1 + monthlyRate, months) / (Math.pow(1 + monthlyRate, months) - 1);
        }

        let balance = principal;
        let totalInterest = 0;
        const tbody = document.getElementById('schedule-body');
        tbody.innerHTML = ''; // 清空先前的表格

        for (let i = 1; i <= months; i++) {
            let interest = balance * monthlyRate;
            let principalPaid = monthlyPayment - interest;

            // 處理最後一期的捨入誤差，確保本金歸零
            if (i === months) {
                principalPaid = balance;
                monthlyPayment = principalPaid + interest;
            }

            balance -= principalPaid;
            totalInterest += interest;

            // 建立表格行
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${i}</td>
                <td>${formatMoney(monthlyPayment)}</td>
                <td>${formatMoney(principalPaid)}</td>
                <td>${formatMoney(interest)}</td>
                <td>${formatMoney(Math.max(0, balance))}</td>
            `;
            tbody.appendChild(tr);
        }

        // 更新摘要資訊
        document.getElementById('summary-monthly').innerText = formatMoney(monthlyPayment);
        document.getElementById('summary-interest').innerText = formatMoney(totalInterest);
        document.getElementById('summary-total').innerText = formatMoney(principal + totalInterest);

        // 顯示結果區塊
        document.getElementById('result-section').style.display = 'block';
    }
</script>

</body>
</html>
