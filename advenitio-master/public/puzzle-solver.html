<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方塊拼圖自動求解器</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 與 ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 引入 Babel 讓瀏覽器可以直接解析 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>
  <!-- React 渲染的容器 -->
  <div id="root"></div>

  <!-- 在這裡編寫 React 代碼 -->
  <script type="text/babel">
    const { useState, useRef } = React;

    // ==========================================
    // 替代 Lucide React 的內聯 SVG 圖標元件
    // ==========================================
    const IconPlay = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="6 3 20 12 6 21 6 3"></polygon></svg>;
    const IconSquare = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2"></rect></svg>;
    const IconPlus = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const IconTrash2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
    const IconRotateCcw = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>;
    const IconSettings = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
    const IconFastForward = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 19 22 12 13 5 13 19"></polygon><polygon points="2 19 11 12 2 5 2 19"></polygon></svg>;


    // ==========================================
    // 求解器主程式
    // ==========================================
    const PIECE_COLORS = [
      'bg-red-500', 'bg-blue-500', 'bg-green-500', 'bg-yellow-400', 
      'bg-purple-500', 'bg-pink-500', 'bg-indigo-500', 'bg-teal-400',
      'bg-orange-500', 'bg-cyan-500', 'bg-lime-500', 'bg-emerald-500'
    ];

    const normalizeCoords = (coords) => {
      if (coords.length === 0) return [];
      const sorted = [...coords].sort((a, b) => a.y !== b.y ? a.y - b.y : a.x - b.x);
      const root = sorted[0];
      return sorted.map(c => ({ x: c.x - root.x, y: c.y - root.y }));
    };

    const generateOrientations = (coords) => {
      const orientations = new Set();
      const result = [];

      const addOrientation = (c) => {
        const norm = normalizeCoords(c);
        const key = JSON.stringify(norm);
        if (!orientations.has(key)) {
          orientations.add(key);
          result.push(norm);
        }
      };

      let current = [...coords];
      for (let i = 0; i < 4; i++) {
        addOrientation(current);
        addOrientation(current.map(p => ({ x: -p.x, y: p.y })));
        current = current.map(p => ({ x: -p.y, y: p.x }));
      }
      return result;
    };

    function App() {
      const [boardWidth, setBoardWidth] = useState(4);
      const [boardHeight, setBoardHeight] = useState(4);
      const [board, setBoard] = useState(Array(4).fill(null).map(() => Array(4).fill('empty')));
      
      const [pieces, setPieces] = useState([
        [{x:0, y:0}, {x:1, y:0}, {x:2, y:0}, {x:2, y:1}],
        [{x:0, y:0}, {x:1, y:0}, {x:2, y:0}, {x:1, y:1}],
        [{x:0, y:0}, {x:1, y:0}, {x:0, y:1}, {x:1, y:1}],
        [{x:0, y:0}, {x:1, y:0}, {x:2, y:0}, {x:3, y:0}],
      ]);

      const [newPieceGrid, setNewPieceGrid] = useState(Array(5).fill(null).map(() => Array(5).fill(false)));
      const [isSolving, setIsSolving] = useState(false);
      const [status, setStatus] = useState('閒置中。請設定版面與方塊後點擊「開始求解」。');
      const [speed, setSpeed] = useState(50);
      
      const stopRequested = useRef(false);
      const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

      const handleResizeBoard = (w, h) => {
        const newW = Math.max(1, Math.min(30, w));
        const newH = Math.max(1, Math.min(30, h));
        setBoardWidth(newW);
        setBoardHeight(newH);
        setBoard(Array(newH).fill(null).map(() => Array(newW).fill('empty')));
        setStatus('版面已重設。');
      };

      const toggleBoardCell = (y, x) => {
        if (isSolving) return;
        const newBoard = board.map(row => [...row]);
        newBoard[y][x] = newBoard[y][x] === 'wall' ? 'empty' : 'wall';
        setBoard(newBoard);
      };

      const toggleNewPieceCell = (y, x) => {
        const grid = newPieceGrid.map(row => [...row]);
        grid[y][x] = !grid[y][x];
        setNewPieceGrid(grid);
      };

      const addNewPiece = () => {
        const coords = [];
        for (let y = 0; y < 5; y++) {
          for (let x = 0; x < 5; x++) {
            if (newPieceGrid[y][x]) coords.push({ x, y });
          }
        }
        if (coords.length > 0) {
          setPieces([...pieces, normalizeCoords(coords)]);
          setNewPieceGrid(Array(5).fill(null).map(() => Array(5).fill(false)));
          setStatus(`已新增第 ${pieces.length + 1} 個方塊。`);
        } else {
          alert("請至少在網格中點擊一個方塊！");
        }
      };

      const removePiece = (index) => {
        if (isSolving) return;
        setPieces(pieces.filter((_, i) => i !== index));
      };

      const clearBoard = () => {
        if (isSolving) return;
        setBoard(Array(boardHeight).fill(null).map(() => Array(boardWidth).fill('empty')));
        setStatus('已清除版面上的方塊與牆壁。');
      };

      const resetSolution = () => {
        if (isSolving) return;
        const newBoard = board.map(row => row.map(cell => cell === 'wall' ? 'wall' : 'empty'));
        setBoard(newBoard);
        setStatus('已重設解答狀態。');
      };

      const canPlace = (currentBoard, pieceCoords, startX, startY) => {
        for (const p of pieceCoords) {
          const x = startX + p.x;
          const y = startY + p.y;
          if (x < 0 || x >= boardWidth || y < 0 || y >= boardHeight) return false;
          if (currentBoard[y][x] !== 'empty') return false;
        }
        return true;
      };

      const placePiece = (currentBoard, pieceCoords, startX, startY, pieceId) => {
        for (const p of pieceCoords) {
          currentBoard[startY + p.y][startX + p.x] = pieceId;
        }
      };

      const removePieceFromBoard = (currentBoard, pieceCoords, startX, startY) => {
        for (const p of pieceCoords) {
          currentBoard[startY + p.y][startX + p.x] = 'empty';
        }
      };

      const solve = async (currentBoard, usedPieces) => {
        if (stopRequested.current) return false;

        let emptyX = -1, emptyY = -1;
        for (let y = 0; y < boardHeight; y++) {
          for (let x = 0; x < boardWidth; x++) {
            if (currentBoard[y][x] === 'empty') {
              emptyX = x; emptyY = y; 
              break;
            }
          }
          if (emptyX !== -1) break;
        }

        if (emptyX === -1) return true; 

        for (let i = 0; i < pieces.length; i++) {
          if (usedPieces.has(i)) continue;

          const piece = pieces[i];
          const orientations = generateOrientations(piece);

          for (const orient of orientations) {
            if (canPlace(currentBoard, orient, emptyX, emptyY)) {
              placePiece(currentBoard, orient, emptyX, emptyY, i);
              setBoard([...currentBoard.map(r => [...r])]); 
              
              if (speed > 0) await sleep(speed);

              usedPieces.add(i);
              if (await solve(currentBoard, usedPieces)) return true;
              
              usedPieces.delete(i);
              removePieceFromBoard(currentBoard, orient, emptyX, emptyY);
              
              if (speed > 0) {
                setBoard([...currentBoard.map(r => [...r])]);
                await sleep(speed);
              }
            }
          }
        }
        return false;
      };

      const startSolving = async () => {
        setIsSolving(true);
        stopRequested.current = false;
        setStatus('求解中... (尋找所有可能的組合)');
        
        const startingBoard = board.map(row => row.map(cell => cell === 'wall' ? 'wall' : 'empty'));
        setBoard(startingBoard);
        
        let emptyCount = 0;
        startingBoard.forEach(row => row.forEach(cell => { if(cell === 'empty') emptyCount++; }));
        let pieceBlocksCount = pieces.reduce((sum, p) => sum + p.length, 0);

        if (emptyCount > pieceBlocksCount) {
          setStatus(`警告：可用空間 (${emptyCount}格) 大於方塊總數 (${pieceBlocksCount}格)，將無法完全填滿。`);
          await sleep(2000);
        }

        const startTime = performance.now();
        const success = await solve(startingBoard, new Set());
        const endTime = performance.now();
        
        if (stopRequested.current) {
          setStatus('已停止求解。');
        } else if (success) {
          setStatus(`已找到解答！耗時 ${((endTime - startTime)/1000).toFixed(2)} 秒。`);
        } else {
          setStatus('無解。找不到可以填滿空間的組合。');
        }
        setIsSolving(false);
      };

      const stopSolving = () => {
        stopRequested.current = true;
        setStatus('正在停止...');
      };

      const renderPiecePreview = (coords, colorClass) => {
        const xs = coords.map(c => c.x);
        const ys = coords.map(c => c.y);
        const minX = Math.min(...xs), maxX = Math.max(...xs);
        const minY = Math.min(...ys), maxY = Math.max(...ys);
        const w = maxX - minX + 1;
        const h = maxY - minY + 1;
        const grid = Array(h).fill(null).map(() => Array(w).fill(false));
        
        coords.forEach(c => {
          grid[c.y - minY][c.x - minX] = true;
        });

        return (
          <div className="flex flex-col items-center">
            <div 
              className="grid gap-px bg-gray-300 p-px"
              style={{ gridTemplateColumns: `repeat(${w}, minmax(0, 1fr))` }}
            >
              {grid.map((row, y) => row.map((isActive, x) => (
                <div 
                  key={`${y}-${x}`} 
                  className={`w-5 h-5 ${isActive ? colorClass : 'bg-transparent'}`}
                />
              )))}
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-neutral-100 text-neutral-800 p-4 md:p-8 font-sans">
          <div className="max-w-6xl mx-auto space-y-6">
            
            <header className="bg-white rounded-2xl p-6 shadow-sm flex flex-col md:flex-row justify-between items-center gap-4">
              <div>
                <h1 className="text-2xl font-bold flex items-center gap-2">
                  <IconRotateCcw className="w-6 h-6 text-indigo-600" />
                  方塊拼圖自動求解器
                </h1>
                <p className="text-sm text-neutral-500 mt-1">使用回溯演算法 (Backtracking) 自動尋找填滿版面的解法。</p>
              </div>
              <div className="px-4 py-2 bg-indigo-50 text-indigo-700 rounded-lg font-medium text-sm border border-indigo-100">
                狀態：{status}
              </div>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              <div className="space-y-6 lg:col-span-1">
                
                <section className="bg-white rounded-2xl p-6 shadow-sm border border-neutral-100">
                  <h2 className="text-lg font-bold mb-4 flex items-center gap-2"><IconSettings className="w-5 h-5" /> 控制中心</h2>
                  
                  <div className="space-y-4">
                    <div className="flex gap-2">
                      {!isSolving ? (
                        <button 
                          onClick={startSolving}
                          className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-xl flex justify-center items-center gap-2 transition-colors"
                        >
                          <IconPlay className="w-5 h-5 fill-current" /> 開始求解
                        </button>
                      ) : (
                        <button 
                          onClick={stopSolving}
                          className="flex-1 bg-red-500 hover:bg-red-600 text-white font-semibold py-3 px-4 rounded-xl flex justify-center items-center gap-2 transition-colors"
                        >
                          <IconSquare className="w-5 h-5 fill-current" /> 停止
                        </button>
                      )}
                      <button 
                        onClick={resetSolution}
                        disabled={isSolving}
                        className="bg-neutral-200 hover:bg-neutral-300 text-neutral-700 font-semibold py-3 px-4 rounded-xl transition-colors disabled:opacity-50"
                        title="重設解答"
                      >
                        <IconRotateCcw className="w-5 h-5" />
                      </button>
                    </div>

                    <div className="space-y-2">
                      <div className="flex justify-between text-sm font-medium">
                        <label className="flex items-center gap-1"><IconFastForward className="w-4 h-4"/> 顯示速度</label>
                        <span className="text-neutral-500">{speed === 0 ? '最高速' : `${speed}ms`}</span>
                      </div>
                      <input 
                        type="range" min="0" max="500" step="10" 
                        value={speed} onChange={(e) => setSpeed(Number(e.target.value))}
                        disabled={isSolving}
                        className="w-full accent-indigo-600"
                      />
                    </div>
                  </div>
                </section>

                <section className="bg-white rounded-2xl p-6 shadow-sm border border-neutral-100">
                  <h2 className="text-lg font-bold mb-4">方塊清單 ({pieces.length})</h2>
                  
                  <div className="flex flex-wrap gap-3 mb-6">
                    {pieces.map((p, i) => (
                      <div key={i} className="relative group p-2 border border-neutral-200 rounded-lg bg-neutral-50 hover:bg-neutral-100 transition-colors">
                        {renderPiecePreview(p, PIECE_COLORS[i % PIECE_COLORS.length])}
                        <button 
                          onClick={() => removePiece(i)}
                          disabled={isSolving}
                          className="absolute -top-2 -right-2 bg-red-500 text-white p-1 rounded-full opacity-0 group-hover:opacity-100 transition-opacity disabled:hidden"
                        >
                          <IconTrash2 className="w-3 h-3" />
                        </button>
                      </div>
                    ))}
                    {pieces.length === 0 && <span className="text-sm text-neutral-500">目前沒有方塊，請在下方繪製並新增。</span>}
                  </div>

                  <hr className="mb-4 border-neutral-200" />
                  <h3 className="text-sm font-semibold mb-3 text-neutral-600">繪製新方塊</h3>
                  
                  <div className="flex flex-col items-center gap-4">
                    <div className="grid grid-cols-5 gap-1 bg-neutral-200 p-1 rounded-lg">
                      {newPieceGrid.map((row, y) => (
                        row.map((isActive, x) => (
                          <button
                            key={`${y}-${x}`}
                            onClick={() => toggleNewPieceCell(y, x)}
                            className={`w-8 h-8 rounded-sm transition-colors duration-150 border border-black/10 ${isActive ? 'bg-indigo-600 shadow-inner' : 'bg-white hover:bg-neutral-100'}`}
                          />
                        ))
                      ))}
                    </div>
                    <button 
                      onClick={addNewPiece}
                      disabled={isSolving}
                      className="w-full bg-neutral-800 hover:bg-black text-white font-medium py-2 px-4 rounded-xl flex justify-center items-center gap-2 transition-colors disabled:opacity-50"
                    >
                      <IconPlus className="w-4 h-4" /> 加入此形狀
                    </button>
                  </div>
                </section>
              </div>

              <div className="lg:col-span-2 space-y-6">
                <section className="bg-white rounded-2xl p-6 shadow-sm border border-neutral-100 flex flex-col h-full">
                  
                  <div className="flex flex-wrap justify-between items-end mb-6 gap-4">
                    <div>
                      <h2 className="text-xl font-bold mb-2">關卡版面</h2>
                      <p className="text-sm text-neutral-500">
                        點擊網格切換 <span className="inline-block w-3 h-3 bg-neutral-100 border border-neutral-300 ml-1"></span> 可用區域 / <span className="inline-block w-3 h-3 bg-neutral-800 ml-1"></span> 牆壁。
                      </p>
                    </div>
                    
                    <div className="flex items-center gap-2 text-sm bg-neutral-50 p-2 rounded-lg border border-neutral-200 flex-wrap">
                      <label className="font-medium text-neutral-600">寬:</label>
                      <div className="flex items-center">
                        <button onClick={() => handleResizeBoard(boardWidth - 1, boardHeight)} disabled={isSolving || boardWidth <= 1} className="px-2 py-1 bg-neutral-200 rounded-l hover:bg-neutral-300 transition-colors disabled:opacity-50">-</button>
                        <input type="number" min="1" max="30" value={boardWidth} onChange={e => handleResizeBoard(Number(e.target.value), boardHeight)} disabled={isSolving} className="w-10 p-1 border-y border-neutral-200 text-center focus:outline-none [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"/>
                        <button onClick={() => handleResizeBoard(boardWidth + 1, boardHeight)} disabled={isSolving || boardWidth >= 30} className="px-2 py-1 bg-neutral-200 rounded-r hover:bg-neutral-300 transition-colors disabled:opacity-50">+</button>
                      </div>
                      
                      <label className="font-medium text-neutral-600 ml-2">高:</label>
                      <div className="flex items-center">
                        <button onClick={() => handleResizeBoard(boardWidth, boardHeight - 1)} disabled={isSolving || boardHeight <= 1} className="px-2 py-1 bg-neutral-200 rounded-l hover:bg-neutral-300 transition-colors disabled:opacity-50">-</button>
                        <input type="number" min="1" max="30" value={boardHeight} onChange={e => handleResizeBoard(boardWidth, Number(e.target.value))} disabled={isSolving} className="w-10 p-1 border-y border-neutral-200 text-center focus:outline-none [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"/>
                        <button onClick={() => handleResizeBoard(boardWidth, boardHeight + 1)} disabled={isSolving || boardHeight >= 30} className="px-2 py-1 bg-neutral-200 rounded-r hover:bg-neutral-300 transition-colors disabled:opacity-50">+</button>
                      </div>

                      <button onClick={clearBoard} disabled={isSolving} className="ml-2 text-red-500 hover:text-red-700 disabled:opacity-50 transition-colors" title="清空版面設定">
                        <IconTrash2 className="w-5 h-5"/>
                      </button>
                    </div>
                  </div>

                  <div className="flex-1 flex justify-center items-center bg-neutral-50 rounded-xl border-2 border-neutral-200 p-4 overflow-auto">
                    <div 
                      className="grid gap-1 p-2 bg-neutral-300 rounded-lg shadow-inner"
                      style={{ gridTemplateColumns: `repeat(${boardWidth}, minmax(0, 1fr))` }}
                    >
                      {board.map((row, y) => (
                        row.map((cell, x) => {
                          let cellClass = "bg-white cursor-pointer hover:bg-neutral-100";
                          if (cell === 'wall') {
                            cellClass = "bg-neutral-800 cursor-pointer";
                          } else if (typeof cell === 'number') {
                            cellClass = `${PIECE_COLORS[cell % PIECE_COLORS.length]} shadow-sm cursor-default border-black/20 border-b-2 border-r-2`;
                          }

                          return (
                            <div
                              key={`${y}-${x}`}
                              onClick={() => toggleBoardCell(y, x)}
                              className={`w-6 h-6 sm:w-8 sm:h-8 rounded-sm transition-all duration-75 ${cellClass}`}
                            />
                          );
                        })
                      ))}
                    </div>
                  </div>
                </section>
              </div>

            </div>
          </div>
        </div>
      );
    }

    // 將 React 元件渲染到畫面上
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
