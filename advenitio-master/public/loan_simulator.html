<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貸款攤還互動視覺化</title>
    <!-- 引入 Chart.js 作為圖表繪製工具 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            width: 200px;
        }
        label {
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        input {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: #3498db;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            align-self: flex-end;
        }
        button:hover {
            background-color: #2980b9;
        }
        .alert {
            padding: 15px;
            background-color: #e74c3c;
            color: white;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            font-weight: bold;
            text-align: center;
        }
        canvas {
            width: 100% !important;
            max-height: 400px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📉 貸款攤還互動視覺化</h2>
    
    <div class="controls">
        <div class="input-group">
            <label for="principal">貸款本金 (元)</label>
            <input type="number" id="principal" value="750000" min="0" step="10000">
        </div>
        <div class="input-group">
            <label for="rate">年利率 (%)</label>
            <input type="number" id="rate" value="20" min="0" step="0.1">
        </div>
        <div class="input-group">
            <label for="payment">每月還款額 (元)</label>
            <input type="number" id="payment" value="12500" min="0" step="500">
        </div>
        <button onclick="calculateLoan()">更新圖表</button>
    </div>

    <div id="warningMsg" class="alert"></div>

    <canvas id="loanChart"></canvas>
</div>

<script>
    let loanChartInstance = null;

    function calculateLoan() {
        // 1. 取得使用者輸入的值
        const P = parseFloat(document.getElementById('principal').value);
        const annualRate = parseFloat(document.getElementById('rate').value);
        const M = parseFloat(document.getElementById('payment').value);
        
        // 2. 計算月利率
        const monthlyRate = (annualRate / 100) / 12;
        
        // 3. 準備繪圖用的資料陣列
        let balance = P;
        let balances = [P]; // 第0個月的本金
        let months = [0];
        
        const warningMsg = document.getElementById('warningMsg');
        warningMsg.style.display = 'none';

        // 4. 核心邏輯：檢查是否發生「零本金攤還」或「負攤還」
        const firstMonthInterest = balance * monthlyRate;
        if (M <= firstMonthInterest) {
            warningMsg.innerText = `⚠️ 警告：每月產生的利息為 ${Math.round(firstMonthInterest)} 元。您的還款額無法減少本金，債務將永遠無法還清！`;
            warningMsg.style.display = 'block';
        }

        // 5. 模擬未來 120 個月 (10年) 的攤還情況
        for (let i = 1; i <= 120; i++) {
            // 單月利息 = 剩餘本金 × 月利率
            let interest = balance * monthlyRate;
            
            // 本金扣減額 = 每月還款 - 單月利息
            let principalReduction = M - interest;
            
            // 更新剩餘本金
            balance -= principalReduction;
            
            // 避免本金變成負數
            if (balance < 0) balance = 0;
            
            balances.push(balance);
            months.push(i);
            
            // 如果已經還清，就停止計算
            if (balance === 0) break;
        }

        // 6. 使用 Chart.js 繪製圖表
        renderChart(months, balances);
    }

    function renderChart(labels, data) {
        const ctx = document.getElementById('loanChart').getContext('2d');
        
        // 如果圖表已存在，先銷毀舊圖表以便重新繪製
        if (loanChartInstance) {
            loanChartInstance.destroy();
        }
        
        loanChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '剩餘本金變化',
                    data: data,
                    borderColor: '#e67e22',
                    backgroundColor: 'rgba(230, 126, 34, 0.1)',
                    borderWidth: 3,
                    pointRadius: 2,
                    fill: true,
                    tension: 0.1 // 讓線條有輕微的弧度
                }]
            },
            options: {
                responsive: true,
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: '期數 (個月)'
                        }
                    },
                    y: {
                        title: {
                            display: true,
                            text: '剩餘本金 (元)'
                        },
                        beginAtZero: true
                    }
                },
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return '剩餘本金: ' + Math.round(context.parsed.y).toLocaleString() + ' 元';
                            }
                        }
                    }
                }
            }
        });
    }

    // 網頁載入完成後自動執行一次計算
    window.onload = calculateLoan;
</script>

</body>
</html>
